name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BUILD_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.ref_name }}
          VITE_BUILD_NUMBER: ${{ github.run_number }}
          VITE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          VITE_BUILD_COMMIT: ${{ github.sha }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Prepare artifact name
        id: artifact
        shell: bash
        run: |
          REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME="${REF_NAME//\//-}"
          echo "name=dist-${SAFE_REF_NAME}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/
          retention-days: 14
